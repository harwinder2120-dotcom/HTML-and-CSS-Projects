<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Styling Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TEXT OVER IMAGE SECTION -->
    <div class="image-wrapper">
        <img src="img/pic.jpg" alt="Background Image">
        <div class="image-text">Welcome to my page</div>
    </div>

    <!-- HEADER -->
    <header>
        <h1>Image Styling Challenge</h1>
    </header>

    <main>

        <!-- INTRO -->
        <div class="intro">
            <p>Welcome to the image styling challenge!</p>
        </div>

        <!-- FIRST IMAGE -->
        <div class="image-container">
            <img src="img/pic.jpg" alt="Sample Image">
        </div>

        <!-- TABLE -->
        <table>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Grade</th>
            </tr>
            <tr>
                <td>Harwinder</td>
                <td>Web Development</td>
                <td>A+</td>
            </tr>
            <tr>
                <td>Alex</td>
                <td>Networking</td>
                <td>B</td>
            </tr>
        </table>

        <!-- FOOTER -->
        <footer>
            This is my styled footer text.
        </footer>

    </main>

</body>
</html>
